# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: local
  hooks:
  - id: ruff
    name: ruff-lint
    stages: [pre-commit]
    language: system
    entry: poetry run ruff check
    types_or: [python, pyi]
    args: [ --fix ]
    exclude: .*_pb2.py

  - id: ruff-format  # formatter
    name: ruff-format
    stages: [pre-commit]
    language: system
    entry: poetry run ruff format
    types_or: [python, pyi]
    exclude: .*_pb2.py

  - id: mypy
    name: mypy
    stages: [pre-commit]
    language: system
    entry: poetry run mypy
    types: [python]
    require_serial: true
    exclude: .*_pb2.py
    # exclude in pyproject.toml does not work properly for the pre-commit
    # therefore we exclude autogenerated files and proto files explicitly

  - id: pylint
    name: pylint
    stages: [ pre-commit ]
    language: system
    entry: poetry run pylint --output-format=parseable
    types: [ python ]
    pass_filenames: true
    args: [
        "-rn", # Only display messages
        "-sn", # Don't display the score
        "--rcfile=pyproject.toml"
    ]

  - id: pytest
    name: pytest
    stages: [pre-commit]
    language: system
    entry: poetry run pytest
    types: [python]
    pass_filenames: false
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    - id: check-yaml
      name: Checking yaml syntax
      types: [text, yaml]
      stages: [pre-commit]

    - id: check-xml
      name: Checking xml syntax
      description: Checking xml syntax
      entry: check-xml
      types: [xml]
      stages: [pre-commit]

    - id: check-merge-conflict
      name: Checking for merge conflict patterns
      types: [text]
      stages: [pre-commit]

    - id: check-added-large-files
      name: Checking for giant files
      stages: [pre-commit]

    - id: trailing-whitespace
      name: Checking and trimming trailing whitespaces
      description: Trailing whitespaces are removed
      types: [text]
      stages: [pre-commit]

    - id: end-of-file-fixer
      name: Checking and fixing file endings
      description: Files end with one new line
      types: [text]
      stages: [pre-commit]

-   repo: https://github.com/python-poetry/poetry
    rev: 1.8.4
    hooks:
    -   id: poetry-lock
        name: poetry-lock
        entry: poetry lock
        language: system
        args: ["--no-update"]
        pass_filenames: false
        files: ^(.*/)?(poetry\.lock|pyproject\.toml)$
        stages: [pre-commit]
